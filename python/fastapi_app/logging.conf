[loggers]
keys=root,two_very_auto,database,fastapi,uvicorn

[handlers]
keys=consoleHandler,infoFileHandler,errorFileHandler,performanceFileHandler,securityFileHandler

[formatters]
keys=consoleFormatter,fileFormatter,jsonFormatter

[logger_root]
level=INFO
handlers=consoleHandler,infoFileHandler,errorFileHandler

[logger_two_very_auto]
level=INFO
handlers=consoleHandler,infoFileHandler,errorFileHandler,performanceFileHandler
qualname=two_very_auto
propagate=0

[logger_database]
level=INFO
handlers=infoFileHandler,performanceFileHandler
qualname=services.database
propagate=0

[logger_fastapi]
level=INFO
handlers=infoFileHandler
qualname=fastapi
propagate=0

[logger_uvicorn]
level=INFO
handlers=infoFileHandler
qualname=uvicorn
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=consoleFormatter
args=(sys.stdout,)

[handler_infoFileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=fileFormatter
args=('../logs/info.log', 'a', 100*1024*1024, 30)

[handler_errorFileHandler]
class=handlers.RotatingFileHandler
level=ERROR
formatter=jsonFormatter
args=('../logs/error.log', 'a', 50*1024*1024, 30)

[handler_performanceFileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=jsonFormatter
args=('../logs/performance.log', 'a', 100*1024*1024, 30)

[handler_securityFileHandler]
class=handlers.RotatingFileHandler
level=WARNING
formatter=jsonFormatter
args=('../logs/security.log', 'a', 50*1024*1024, 30)

[formatter_consoleFormatter]
format=%(levelname)s:%(name)s:%(message)s

[formatter_fileFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_jsonFormatter]
format={"timestamp": "%(asctime)s", "logger": "%(name)s", "level": "%(levelname)s", "message": "%(message)s", "module": "%(module)s", "line": "%(lineno)d"}
datefmt=%Y-%m-%d %H:%M:%S

