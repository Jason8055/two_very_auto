<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Two Very Auto - 방 상세 정보</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d3748 50%, #1a252f 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 상단 네비게이션 */
        .top-nav {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .nav-btn {
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid rgba(78, 205, 196, 0.4);
            color: #4ecdc4;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .nav-btn:hover {
            background: rgba(78, 205, 196, 0.3);
            transform: translateY(-2px);
        }
        
        /* 새로고침 버튼 */
        .refresh-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .refresh-btn {
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        /* 단일 페어 카드 중앙 배치 */
        .pair-detail-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            min-height: 50vh;
        }
        
        .pair-detail-card {
            background: rgba(30, 35, 40, 0.95);
            border-radius: 15px;
            padding: 30px;
            position: relative;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        /* Player Pair - 빨간색 테두리 */
        .pair-detail-card.player {
            border: 3px solid #ff4444;
        }
        
        /* Banker Pair - 청록색 테두리 */
        .pair-detail-card.banker {
            border: 3px solid #4ecdc4;
        }
        
        .pair-detail-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }
        
        /* 상단 우측 점 아이콘 */
        .pair-status-icon {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .pair-status-icon.player {
            background-color: #ff4444;
        }
        
        .pair-status-icon.banker {
            background-color: #4ecdc4;
        }
        
        /* 페어 헤더 */
        .pair-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .pair-detail-type {
            font-size: 1.4em;
            font-weight: bold;
            color: #ffffff;
        }
        
        /* 게임 정보 그리드 - 2x2 */
        .game-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .game-info-item {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            font-size: 1.1em;
            color: #ffffff;
            font-weight: bold;
        }
        
        /* 상세 정보 */
        .pair-details {
            margin: 20px 0;
            font-size: 1em;
            color: #cccccc;
            line-height: 1.5;
        }
        
        .pair-details div {
            margin: 8px 0;
        }
        
        /* 페어 설명 - 이미지와 동일한 스타일 */
        .pair-description {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            text-align: center;
            font-size: 1.1em;
            color: #ffffff;
            line-height: 1.4;
        }
        
        /* 카드 표시 */
        .cards-display {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }
        
        .card-item {
            background: #ffffff;
            color: #000000;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            min-width: 50px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
        }
        
        .card-item.red {
            color: #cc0000;
        }
        
        /* 로딩 및 에러 상태 */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: #cccccc;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
        }
        
        .timestamp {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.9em;
        }
        
        /* 반응형 디자인 */
        @media (max-width: 768px) {
            .pair-detail-card {
                padding: 20px;
                margin: 0 10px;
            }
            
            body {
                padding: 10px;
            }
            
            .nav-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
            
            .game-info-grid {
                gap: 10px;
            }
            
            .game-info-item {
                padding: 12px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="/" class="nav-btn">← 방 목록으로</a>
        </div>
        
        <div class="refresh-section">
            <button class="refresh-btn" onclick="loadPairDetailData()">🔄 새로고침</button>
        </div>
        
        <div class="pair-detail-container" id="pairDetailContainer">
            <div class="loading pulse">페어 데이터 로딩 중...</div>
        </div>
        
        <div class="timestamp" id="lastUpdate"></div>
    </div>

    <script>
        let ws = null;
        let reconnectInterval = null;
        let currentRoom = { type: '', name: '' };
        
        // URL 파라미터에서 방 정보 추출
        function getRoomFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomType = urlParams.get('type');
            const roomName = urlParams.get('name');
            
            if (roomType && roomName) {
                currentRoom = { type: roomType, name: roomName };
                return true;
            }
            return false;
        }
        
        // 페이지 로드시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            if (getRoomFromURL()) {
                loadPairDetailData();
                connectWebSocket();
                setInterval(loadPairDetailData, 30000);
                updateTimestamp();
            } else {
                // URL 파라미터가 없으면 기본 데이터 표시
                loadPairDetailData();
                updateTimestamp();
            }
        });
        
        // 페어 상세 데이터 로드
        async function loadPairDetailData() {
            try {
                let response;
                if (currentRoom.type && currentRoom.name) {
                    // 특정 방 데이터
                    response = await fetch(`/api/multi-room/rooms/${encodeURIComponent(currentRoom.type)}/${encodeURIComponent(currentRoom.name)}/pairs?limit=9`);
                } else {
                    // 기본 데이터 (종합)
                    response = await fetch('/api/packet-data/pairs?limit=9');
                }
                
                const data = await response.json();
                
                if (data.success) {
                    displayPairDetail(data.pairs && data.pairs[0] ? data.pairs[0] : null);
                    updateTimestamp();
                } else {
                    showError('데이터 로드 실패: ' + (data.message || '알 수 없는 오류'));
                }
                
            } catch (error) {
                console.error('페어 데이터 로드 오류:', error);
                // 실제 데이터가 없으면 샘플 데이터 표시
                displaySamplePairDetail();
                updateTimestamp();
            }
        }
        
        // 샘플 페어 상세 데이터 표시 (이미지와 동일)
        function displaySamplePairDetail() {
            const pairDetailContainer = document.getElementById('pairDetailContainer');
            pairDetailContainer.innerHTML = `
                <div class="pair-detail-card player">
                    <div class="pair-status-icon player"></div>
                    
                    <div class="pair-detail-header">
                        <div class="pair-detail-type">Player Pair</div>
                    </div>
                    
                    <div class="game-info-grid">
                        <div class="game-info-item">게임 #2</div>
                        <div class="game-info-item">승부: Tie</div>
                        <div class="game-info-item">P: 6점</div>
                        <div class="game-info-item">B: 6점</div>
                    </div>
                    
                    <div class="pair-details">
                        <div><strong>테이블:</strong> obj64qcnqfunjejl</div>
                        <div><strong>방명:</strong> 스피드 바카라 J</div>
                        <div><strong>시간:</strong> 2025. 8. 20. 오후 4:00:14</div>
                    </div>
                    
                    <div class="pair-description">
                        Player Pair: 플레이어 첫 두 장 같은 숫자 확인됨
                        
                        <div class="cards-display">
                            <div class="card-item">3♠</div>
                            <div class="card-item red">3♥</div>
                        </div>
                    </div>
                </div>`;
        }
        
        // 페어 상세 표시 (실제 데이터용)
        function displayPairDetail(pair) {
            const pairDetailContainer = document.getElementById('pairDetailContainer');
            
            if (!pair) {
                displaySamplePairDetail();
                return;
            }
            
            const pairTypes = pair.pair_type || [];
            
            let cardClass = 'pair-detail-card';
            let iconClass = 'pair-status-icon';
            let pairTypeText = '';
            
            if (pairTypes.includes('Player Pair')) {
                cardClass += ' player';
                iconClass += ' player';
                pairTypeText = 'Player Pair';
            } else if (pairTypes.includes('Banker Pair')) {
                cardClass += ' banker';
                iconClass += ' banker';
                pairTypeText = 'Banker Pair';
            } else {
                // 기본적으로 Player Pair로 설정
                cardClass += ' player';
                iconClass += ' player';
                pairTypeText = 'Player Pair';
            }
            
            const gameNumber = pair.game_number || 2;
            const winner = pair.winner || 'Tie';
            const playerScore = pair.player_score || 6;
            const bankerScore = pair.banker_score || 6;
            const tableId = pair.table_id || 'obj64qcnqfunjejl';
            const roomName = pair.room_name || currentRoom.name || '스피드 바카라 J';
            const timestamp = pair.timestamp || '2025. 8. 20. 오후 4:00:14';
            
            // 페어 카드 생성
            let pairCards = '';
            const visualization = pair.visualization?.pair_visualization || [];
            if (visualization.length > 0 && visualization[0].cards_simulated) {
                pairCards = visualization[0].cards_simulated.map(card => {
                    const isRed = card.card && (card.card.includes('♥') || card.card.includes('♦'));
                    return `<div class="card-item ${isRed ? 'red' : ''}">${card.card || '?'}</div>`;
                }).join('');
            } else {
                // 샘플 카드 생성
                const sampleCards = ['3♠', '3♥'];
                pairCards = sampleCards.map(card => {
                    const isRed = card.includes('♥') || card.includes('♦');
                    return `<div class="card-item ${isRed ? 'red' : ''}">${card}</div>`;
                }).join('');
            }
            
            pairDetailContainer.innerHTML = `
                <div class="${cardClass}">
                    <div class="${iconClass}"></div>
                    
                    <div class="pair-detail-header">
                        <div class="pair-detail-type">${pairTypeText}</div>
                    </div>
                    
                    <div class="game-info-grid">
                        <div class="game-info-item">게임 #${gameNumber}</div>
                        <div class="game-info-item">승부: ${winner}</div>
                        <div class="game-info-item">P: ${playerScore}점</div>
                        <div class="game-info-item">B: ${bankerScore}점</div>
                    </div>
                    
                    <div class="pair-details">
                        <div><strong>테이블:</strong> ${tableId}</div>
                        <div><strong>방명:</strong> ${roomName}</div>
                        <div><strong>시간:</strong> ${formatTimestamp(timestamp)}</div>
                    </div>
                    
                    <div class="pair-description">
                        ${pairTypes.includes('Player Pair') ? 
                            'Player Pair: 플레이어 첫 두 장 같은 숫자 확인됨' : 
                            pairTypes.includes('Banker Pair') ? 
                            'Banker Pair: 뱅커 첫 두 장 같은 숫자 확인됨' : 
                            'Player Pair: 플레이어 첫 두 장 같은 숫자 확인됨'
                        }
                        
                        <div class="cards-display">
                            ${pairCards}
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 타임스탬프 포맷
        function formatTimestamp(timestamp) {
            if (!timestamp) return 'N/A';
            try {
                if (typeof timestamp === 'string' && timestamp.includes('2025')) {
                    return timestamp;
                }
                const date = new Date(timestamp);
                return date.toLocaleString('ko-KR');
            } catch (e) {
                return timestamp;
            }
        }
        
        // 오류 표시
        function showError(message) {
            const pairDetailContainer = document.getElementById('pairDetailContainer');
            pairDetailContainer.innerHTML = `
                <div class="error">
                    <h3>⚠️ 오류 발생</h3>
                    <p>${message}</p>
                    <button class="refresh-btn" onclick="loadPairDetailData()" style="margin-top: 15px;">다시 시도</button>
                </div>
            `;
        }
        
        // 타임스탬프 업데이트
        function updateTimestamp() {
            const timestampElement = document.getElementById('lastUpdate');
            const now = new Date().toLocaleString('ko-KR');
            timestampElement.textContent = `마지막 업데이트: ${now}`;
        }
        
        // WebSocket 연결
        function connectWebSocket() {
            try {
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${wsProtocol}//${window.location.host}/ws/pair-notifications`;
                
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function(event) {
                    console.log('WebSocket 연결됨');
                };
                
                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'pair_detected') {
                            loadPairDetailData();
                        }
                    } catch (e) {
                        console.error('WebSocket 메시지 파싱 오류:', e);
                    }
                };
                
                ws.onclose = function(event) {
                    console.log('WebSocket 연결 종료');
                    if (reconnectInterval) clearTimeout(reconnectInterval);
                    reconnectInterval = setTimeout(connectWebSocket, 5000);
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket 오류:', error);
                };
                
            } catch (error) {
                console.error('WebSocket 연결 실패:', error);
            }
        }
    </script>
</body>
</html>
