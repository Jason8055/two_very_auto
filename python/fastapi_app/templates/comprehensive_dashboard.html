<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Two Very Auto - 종합 바카라 방 통계</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d3748 50%, #1a252f 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 헤더 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 1.1em;
            color: #cccccc;
        }
        
        /* 네비게이션 */
        .nav-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid rgba(78, 205, 196, 0.4);
            color: #4ecdc4;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: rgba(78, 205, 196, 0.3);
            transform: translateY(-2px);
        }
        
        /* 전체 통계 카드 */
        .overview-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(43, 48, 53, 0.9);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #cccccc;
            font-weight: 500;
        }
        
        /* 통계별 색상 */
        .stat-card:nth-child(1) .stat-number { color: #4ecdc4; } /* 전체 방 */
        .stat-card:nth-child(2) .stat-number { color: #ff6b6b; } /* 활성 방 */
        .stat-card:nth-child(3) .stat-number { color: #ffa726; } /* 전체 게임 */
        .stat-card:nth-child(4) .stat-number { color: #ab47bc; } /* 플레이어 페어 */
        .stat-card:nth-child(5) .stat-number { color: #45b7d1; } /* 뱅커 페어 */
        .stat-card:nth-child(6) .stat-number { color: #66bb6a; } /* 양쪽 페어 */
        
        /* 방 타입 섹션 */
        .room-types-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .room-types-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .room-type-card {
            background: rgba(43, 48, 53, 0.95);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .room-type-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border-color: #4ecdc4;
        }
        
        .room-type-header {
            font-size: 1.2em;
            font-weight: bold;
            color: #4ecdc4;
            margin-bottom: 15px;
        }
        
        .room-type-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .type-stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 0.9em;
        }
        
        .type-stat-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #ffffff;
            display: block;
        }
        
        .type-stat-label {
            color: #cccccc;
            margin-top: 5px;
        }
        
        /* 방 목록 섹션 */
        .rooms-section {
            margin-bottom: 30px;
        }
        
        .filter-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: rgba(78, 205, 196, 0.3);
            border-color: #4ecdc4;
            color: #4ecdc4;
        }
        
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .room-card {
            background: rgba(43, 48, 53, 0.95);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        .room-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .room-card.active-room {
            border-color: #4ecdc4;
        }
        
        .room-card.inactive-room {
            opacity: 0.7;
            border-color: #666;
        }
        
        .room-status {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .room-status.active {
            background-color: #4ecdc4;
            box-shadow: 0 0 10px rgba(78, 205, 196, 0.5);
        }
        
        .room-status.inactive {
            background-color: #666;
        }
        
        .room-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 15px;
        }
        
        .room-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .room-stat-item {
            text-align: center;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            font-size: 0.85em;
        }
        
        .room-stat-value {
            font-weight: bold;
            color: #ffffff;
            display: block;
        }
        
        .room-stat-label {
            color: #cccccc;
            margin-top: 3px;
        }
        
        .room-details {
            font-size: 0.8em;
            color: #aaa;
            line-height: 1.4;
        }
        
        .room-details div {
            margin: 3px 0;
        }
        
        /* 로딩 및 에러 */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: #cccccc;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
            font-size: 1.1em;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        /* 새로고침 버튼 */
        .refresh-section {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .refresh-btn {
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .refresh-btn.auto-refresh {
            background: linear-gradient(45deg, #ff6b6b, #ffa726);
        }
        
        .refresh-btn.auto-refresh.active {
            background: linear-gradient(45deg, #4caf50, #66bb6a);
            animation: pulse-glow 2s infinite;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(76, 175, 80, 0.5); }
            50% { box-shadow: 0 0 20px rgba(76, 175, 80, 0.8); }
            100% { box-shadow: 0 0 5px rgba(76, 175, 80, 0.5); }
        }
        
        /* 상태 섹션 */
        .status-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(43, 48, 53, 0.7);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .status-indicator {
            font-size: 1em;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .status-indicator.active {
            color: #4caf50;
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
            animation: status-pulse 2s infinite;
        }
        
        .status-indicator.inactive {
            color: #ff6b6b;
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }
        
        @keyframes status-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .refresh-interval {
            color: #4ecdc4;
            font-size: 0.9em;
            font-weight: bold;
            padding: 6px 12px;
            background: rgba(78, 205, 196, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }
        
        .last-update {
            color: #cccccc;
            font-size: 0.9em;
            font-weight: normal;
        }
        
        /* 반응형 */
        @media (max-width: 768px) {
            .overview-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .room-types-grid {
                grid-template-columns: 1fr;
            }
            
            .rooms-grid {
                grid-template-columns: 1fr;
            }
            
            .nav-section {
                flex-direction: column;
                align-items: center;
            }
            
            .nav-btn {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Two Very Auto - 종합 바카라 방 통계</h1>
            <p>전체 바카라 방의 실시간 통계 및 페어 정보 종합 대시보드</p>
        </div>
        
        <div class="nav-section">
            <a href="/" class="nav-btn">🏠 메인 대시보드</a>
            <a href="/pair-dashboard" class="nav-btn">📊 페어 상세</a>
            <a href="#" class="nav-btn active">🎯 종합 통계</a>
            <a href="/pair-stats" class="nav-btn">📈 상세 분석</a>
        </div>
        
        <div class="refresh-section">
            <button class="refresh-btn" onclick="refreshAllData()" id="refreshBtn">🔄 전체 새로고침</button>
        </div>
        
        <!-- 전체 통계 -->
        <div class="overview-stats" id="overviewStats">
            <div class="stat-card">
                <div class="stat-number" id="totalRooms">--</div>
                <div class="stat-label">전체 방 수</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeRooms">--</div>
                <div class="stat-label">활성 방 수</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalGames">--</div>
                <div class="stat-label">전체 게임 수</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalPlayerPairs">--</div>
                <div class="stat-label">플레이어 페어</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalBankerPairs">--</div>
                <div class="stat-label">뱅커 페어</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalBothPairs">--</div>
                <div class="stat-label">양쪽 페어</div>
            </div>
        </div>
        
        <!-- 방 타입별 통계 -->
        <div class="room-types-section">
            <h2 class="section-title">방 타입별 통계</h2>
            <div class="room-types-grid" id="roomTypesGrid">
                <div class="loading pulse">방 타입 통계 로딩 중...</div>
            </div>
        </div>
        
        <!-- 방 목록 -->
        <div class="rooms-section">
            <h2 class="section-title">바카라 방 목록</h2>
            
            <div class="filter-controls" id="filterControls">
                <button class="filter-btn active" onclick="filterRooms('all')">전체</button>
                <button class="filter-btn" onclick="filterRooms('active')">활성 방</button>
                <button class="filter-btn" onclick="filterRooms('inactive')">비활성 방</button>
            </div>
            
            <div class="rooms-grid" id="roomsGrid">
                <div class="loading pulse">방 목록 로딩 중...</div>
            </div>
        </div>
    </div>

    <script>
        let allRooms = [];
        let roomTypes = {};
        let currentFilter = 'all';
        
        // 페이지 로드시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            loadAllData();
            setInterval(loadAllData, 60000); // 1분마다 자동 새로고침
        });
        
        // 전체 데이터 로드
        async function loadAllData() {
            try {
                await Promise.all([
                    loadOverviewStats(),
                    loadRoomTypes(),
                    loadRooms()
                ]);
                
                console.log('모든 데이터 로딩 완료');
            } catch (error) {
                console.error('데이터 로딩 실패:', error);
                showError('데이터 로딩에 실패했습니다.');
            }
        }
        
        // 전체 통계 로드
        async function loadOverviewStats() {
            try {
                const response = await fetch('/api/multi-room/statistics');
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.statistics.overview;
                    document.getElementById('totalRooms').textContent = stats.total_rooms.toLocaleString();
                    document.getElementById('activeRooms').textContent = stats.active_rooms.toLocaleString();
                    document.getElementById('totalGames').textContent = stats.total_games.toLocaleString();
                    document.getElementById('totalPlayerPairs').textContent = stats.total_player_pairs.toLocaleString();
                    document.getElementById('totalBankerPairs').textContent = stats.total_banker_pairs.toLocaleString();
                    document.getElementById('totalBothPairs').textContent = stats.total_both_pairs.toLocaleString();
                }
            } catch (error) {
                console.error('전체 통계 로드 실패:', error);
            }
        }
        
        // 방 타입 통계 로드
        async function loadRoomTypes() {
            try {
                const response = await fetch('/api/multi-room/room-types');
                const data = await response.json();
                
                if (data.success) {
                    displayRoomTypes(data.room_types);
                }
            } catch (error) {
                console.error('방 타입 로드 실패:', error);
            }
        }
        
        // 방 목록 로드
        async function loadRooms() {
            try {
                const response = await fetch('/api/multi-room/rooms');
                const data = await response.json();
                
                if (data.success) {
                    allRooms = data.rooms;
                    displayRooms(allRooms);
                }
            } catch (error) {
                console.error('방 목록 로드 실패:', error);
            }
        }
        
        // 방 타입 표시
        function displayRoomTypes(roomTypes) {
            const grid = document.getElementById('roomTypesGrid');
            
            if (!roomTypes || roomTypes.length === 0) {
                grid.innerHTML = '<div class="error">방 타입 데이터가 없습니다.</div>';
                return;
            }
            
            grid.innerHTML = roomTypes.map(type => `
                <div class="room-type-card" onclick="filterRoomsByType('${type.room_type}')">
                    <div class="room-type-header">${type.room_type}</div>
                    <div class="room-type-stats">
                        <div class="type-stat-item">
                            <span class="type-stat-value">${type.total_rooms}</span>
                            <div class="type-stat-label">전체 방</div>
                        </div>
                        <div class="type-stat-item">
                            <span class="type-stat-value">${type.active_rooms}</span>
                            <div class="type-stat-label">활성 방</div>
                        </div>
                        <div class="type-stat-item">
                            <span class="type-stat-value">${type.total_games.toLocaleString()}</span>
                            <div class="type-stat-label">총 게임</div>
                        </div>
                        <div class="type-stat-item">
                            <span class="type-stat-value">${type.player_pair_rate}%</span>
                            <div class="type-stat-label">플레이어 페어율</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 방 목록 표시
        function displayRooms(rooms) {
            const grid = document.getElementById('roomsGrid');
            
            if (!rooms || rooms.length === 0) {
                grid.innerHTML = '<div class="error">방 데이터가 없습니다.</div>';
                return;
            }
            
            grid.innerHTML = rooms.map(room => `
                <div class="room-card ${room.status}-room" onclick="openRoomDetails('${room.room_type}', '${room.room_name}')">
                    <div class="room-status ${room.status}"></div>
                    <div class="room-name">${room.display_name}</div>
                    <div class="room-stats">
                        <div class="room-stat-item">
                            <span class="room-stat-value">${room.total_games.toLocaleString()}</span>
                            <div class="room-stat-label">총 게임</div>
                        </div>
                        <div class="room-stat-item">
                            <span class="room-stat-value">${room.player_pairs}</span>
                            <div class="room-stat-label">플레이어 페어</div>
                        </div>
                        <div class="room-stat-item">
                            <span class="room-stat-value">${room.banker_pairs}</span>
                            <div class="room-stat-label">뱅커 페어</div>
                        </div>
                        <div class="room-stat-item">
                            <span class="room-stat-value">${room.win_rate}%</span>
                            <div class="room-stat-label">승률</div>
                        </div>
                    </div>
                    <div class="room-details">
                        <div><strong>마지막 활동:</strong> ${room.last_activity}</div>
                        <div><strong>파일 수:</strong> ${room.files_count}개</div>
                        <div><strong>상태:</strong> ${room.status === 'active' ? '활성' : '비활성'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // 방 필터링
        function filterRooms(filter) {
            currentFilter = filter;
            
            // 필터 버튼 상태 업데이트
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            let filteredRooms = allRooms;
            
            if (filter === 'active') {
                filteredRooms = allRooms.filter(room => room.status === 'active');
            } else if (filter === 'inactive') {
                filteredRooms = allRooms.filter(room => room.status === 'inactive');
            }
            
            displayRooms(filteredRooms);
        }
        
        // 방 타입별 필터링
        function filterRoomsByType(roomType) {
            const filteredRooms = allRooms.filter(room => room.room_type === roomType);
            displayRooms(filteredRooms);
            
            // 스크롤 이동
            document.querySelector('.rooms-section').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 방 상세 정보 열기
        function openRoomDetails(roomType, roomName) {
            const url = `/room-details?type=${encodeURIComponent(roomType)}&name=${encodeURIComponent(roomName)}`;
            window.open(url, '_blank');
        }
        
        // 전체 데이터 새로고침
        async function refreshAllData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '🔄 새로고침 중...';
            
            try {
                // 서버에서 강제 새로고침 요청
                await fetch('/api/multi-room/refresh', { method: 'POST' });
                await loadAllData();
                
                btn.textContent = '✅ 새로고침 완료';
                setTimeout(() => {
                    btn.textContent = '🔄 전체 새로고침';
                    btn.disabled = false;
                }, 2000);
                
            } catch (error) {
                console.error('새로고침 실패:', error);
                btn.textContent = '❌ 새로고침 실패';
                btn.disabled = false;
                
                setTimeout(() => {
                    btn.textContent = '🔄 전체 새로고침';
                }, 3000);
            }
        }
        
        // 에러 표시
        function showError(message) {
            document.getElementById('overviewStats').innerHTML = `
                <div class="error">${message}</div>
            `;
        }
    </script>
</body>
</html>
