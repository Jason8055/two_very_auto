<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페어 알림 채널 테스트 클라이언트</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            text-align: center;
            padding: 30px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .content {
            padding: 30px;
        }
        
        .status-panel {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 5px solid #28a745;
        }
        
        .status {
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .status.disconnected {
            color: #dc3545;
            border-left-color: #dc3545;
        }
        
        .status.connected {
            color: #28a745;
            border-left-color: #28a745;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-primary {
            background: #007bff;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #212529;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .alerts-container {
            background: #fff;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .alert-item {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            animation: slideIn 0.3s ease-out;
        }
        
        .alert-item:last-child {
            border-bottom: none;
        }
        
        .alert-high {
            border-left: 5px solid #dc3545;
            background: linear-gradient(90deg, #dc35451a, transparent);
        }
        
        .alert-medium {
            border-left: 5px solid #ffc107;
            background: linear-gradient(90deg, #ffc1071a, transparent);
        }
        
        .alert-low {
            border-left: 5px solid #28a745;
            background: linear-gradient(90deg, #28a7451a, transparent);
        }
        
        .alert-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .alert-type {
            font-size: 1.1em;
            font-weight: bold;
            color: #495057;
        }
        
        .alert-time {
            font-size: 0.9em;
            color: #6c757d;
        }
        
        .alert-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .alert-detail {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
        }
        
        .alert-detail strong {
            display: block;
            color: #495057;
            margin-bottom: 5px;
        }
        
        .cards {
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .card-red {
            color: #dc3545;
        }
        
        .card-black {
            color: #212529;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #495057;
        }
        
        .stat-label {
            color: #6c757d;
            margin-top: 5px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .alert-details {
                grid-template-columns: 1fr;
            }
            
            .stats {
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🃏 페어 알림 채널 테스트</h1>
            <p>실시간 바카라 페어 감지 및 알림 시스템</p>
        </div>
        
        <div class="content">
            <!-- 연결 상태 -->
            <div class="status-panel">
                <div class="status disconnected" id="connectionStatus">
                    ❌ WebSocket 연결 끊어짐
                </div>
                <div style="margin-top: 10px; font-size: 0.9em; color: #6c757d;">
                    서버 주소: <code>ws://127.0.0.1:8765</code>
                </div>
            </div>
            
            <!-- 제어 버튼 -->
            <div class="controls">
                <button class="btn btn-primary" onclick="connectWebSocket()">🔗 연결</button>
                <button class="btn btn-danger" onclick="disconnectWebSocket()">❌ 연결 해제</button>
                <button class="btn btn-success" onclick="getRecentAlerts()">📋 최근 알림 조회</button>
                <button class="btn btn-warning" onclick="clearAlerts()">🗑️ 알림 지우기</button>
                <button class="btn btn-primary" onclick="sendTestMessage()">🧪 테스트 메시지</button>
            </div>
            
            <!-- 통계 -->
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalAlerts">0</div>
                    <div class="stat-label">총 알림</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="playerPairs">0</div>
                    <div class="stat-label">플레이어 페어</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="bankerPairs">0</div>
                    <div class="stat-label">뱅커 페어</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="bothPairs">0</div>
                    <div class="stat-label">Both 페어</div>
                </div>
            </div>
            
            <!-- 알림 목록 -->
            <div class="alerts-container" id="alertsContainer">
                <div class="empty-state">
                    <h3>📭 알림이 없습니다</h3>
                    <p>WebSocket에 연결하고 페어 알림을 기다려보세요!</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let ws = null;
        let alerts = [];
        let stats = {
            total: 0,
            playerPairs: 0,
            bankerPairs: 0,
            bothPairs: 0
        };
        
        function updateConnectionStatus(connected) {
            const statusElement = document.getElementById('connectionStatus');
            if (connected) {
                statusElement.className = 'status connected';
                statusElement.textContent = '✅ WebSocket 연결됨';
            } else {
                statusElement.className = 'status disconnected';
                statusElement.textContent = '❌ WebSocket 연결 끊어짐';
            }
        }
        
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                alert('이미 연결되어 있습니다.');
                return;
            }
            
            try {
                ws = new WebSocket('ws://127.0.0.1:8765');
                
                ws.onopen = function(event) {
                    console.log('WebSocket 연결됨:', event);
                    updateConnectionStatus(true);
                };
                
                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        console.log('메시지 수신:', data);
                        handleMessage(data);
                    } catch (e) {
                        console.error('메시지 파싱 오류:', e);
                    }
                };
                
                ws.onclose = function(event) {
                    console.log('WebSocket 연결 종료:', event);
                    updateConnectionStatus(false);
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket 오류:', error);
                    updateConnectionStatus(false);
                };
                
            } catch (error) {
                console.error('WebSocket 연결 실패:', error);
                alert('WebSocket 연결에 실패했습니다. 서버가 실행 중인지 확인하세요.');
            }
        }
        
        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                ws = null;
                updateConnectionStatus(false);
            }
        }
        
        function handleMessage(data) {
            switch (data.type) {
                case 'connection_established':
                    alert(`연결 성공: ${data.message}`);
                    break;
                    
                case 'pair_alert':
                    addAlert(data);
                    break;
                    
                case 'recent_alerts':
                    alerts = data.alerts || [];
                    renderAlerts();
                    updateStats();
                    break;
                    
                case 'pong':
                    console.log('서버 응답:', data);
                    break;
                    
                default:
                    console.log('알 수 없는 메시지 타입:', data.type);
            }
        }
        
        function addAlert(alertData) {
            alerts.unshift(alertData);
            
            // 최대 100개까지만 유지
            if (alerts.length > 100) {
                alerts = alerts.slice(0, 100);
            }
            
            renderAlerts();
            updateStats();
            
            // 브라우저 알림 (권한이 있는 경우)
            if (Notification.permission === 'granted') {
                new Notification(`🃏 ${alertData.pair_type} 감지!`, {
                    body: `테이블: ${alertData.table_name}\n카드: ${alertData.pair_cards.join(', ')}`,
                    icon: '🃏'
                });
            }
        }
        
        function renderAlerts() {
            const container = document.getElementById('alertsContainer');
            
            if (alerts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 알림이 없습니다</h3>
                        <p>WebSocket에 연결하고 페어 알림을 기다려보세요!</p>
                    </div>
                `;
                return;
            }
            
            const alertsHtml = alerts.map(alert => {
                const priorityClass = `alert-${alert.priority.toLowerCase()}`;
                const time = new Date(alert.alert_time).toLocaleTimeString('ko-KR');
                
                const playerCards = formatCards(alert.player_cards);
                const bankerCards = formatCards(alert.banker_cards);
                const pairCards = formatCards(alert.pair_cards);
                
                return `
                    <div class="alert-item ${priorityClass}">
                        <div class="alert-header">
                            <span class="alert-type">🃏 ${alert.pair_type.replace('_', ' ')}</span>
                            <span class="alert-time">${time}</span>
                        </div>
                        
                        <div class="alert-details">
                            <div class="alert-detail">
                                <strong>테이블</strong>
                                ${alert.table_name}
                            </div>
                            <div class="alert-detail">
                                <strong>게임 결과</strong>
                                ${alert.result} (${alert.player_score} vs ${alert.banker_score})
                            </div>
                            <div class="alert-detail">
                                <strong>플레이어 카드</strong>
                                <span class="cards">${playerCards}</span>
                            </div>
                            <div class="alert-detail">
                                <strong>뱅커 카드</strong>
                                <span class="cards">${bankerCards}</span>
                            </div>
                            <div class="alert-detail" style="grid-column: 1 / -1;">
                                <strong>페어 카드</strong>
                                <span class="cards" style="font-size: 1.3em;">${pairCards}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = alertsHtml;
        }
        
        function formatCards(cards) {
            if (!cards || cards.length === 0) return '-';
            
            return cards.map(card => {
                const suit = card.slice(-1);
                const isRed = ['♥', '♦'].includes(suit);
                const className = isRed ? 'card-red' : 'card-black';
                return `<span class="${className}">${card}</span>`;
            }).join(' ');
        }
        
        function updateStats() {
            stats.total = alerts.length;
            stats.playerPairs = alerts.filter(a => a.pair_type === 'PLAYER_PAIR').length;
            stats.bankerPairs = alerts.filter(a => a.pair_type === 'BANKER_PAIR').length;
            stats.bothPairs = alerts.filter(a => a.pair_type === 'BOTH_PAIR').length;
            
            document.getElementById('totalAlerts').textContent = stats.total;
            document.getElementById('playerPairs').textContent = stats.playerPairs;
            document.getElementById('bankerPairs').textContent = stats.bankerPairs;
            document.getElementById('bothPairs').textContent = stats.bothPairs;
        }
        
        function getRecentAlerts() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('WebSocket이 연결되어 있지 않습니다.');
                return;
            }
            
            ws.send(JSON.stringify({
                type: 'get_recent_alerts'
            }));
        }
        
        function clearAlerts() {
            if (confirm('모든 알림을 지우시겠습니까?')) {
                alerts = [];
                renderAlerts();
                updateStats();
            }
        }
        
        function sendTestMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('WebSocket이 연결되어 있지 않습니다.');
                return;
            }
            
            ws.send(JSON.stringify({
                type: 'ping'
            }));
        }
        
        // 브라우저 알림 권한 요청
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
        
        // 페이지 로드 시 자동 연결 시도
        window.addEventListener('load', function() {
            setTimeout(connectWebSocket, 1000);
        });
        
        // 페이지 언로드 시 연결 해제
        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
