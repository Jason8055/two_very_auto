# Two Very Auto v3.0 - Prometheus 설정
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'two-very-auto-monitor'

# 알림 규칙 파일
rule_files:
  - "alert_rules.yml"

# 알림 매니저 설정 (필요시 활성화)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# 스크래핑 대상 설정
scrape_configs:
  # Prometheus 자체 모니터링
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Two Very Auto 웹서버 메트릭
  - job_name: 'two-auto-web'
    static_configs:
      - targets: ['web:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Two Very Auto AI 엔진 메트릭 
  - job_name: 'two-auto-ai'
    static_configs:
      - targets: ['ai-engine:5001']
    metrics_path: '/ai/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Redis 메트릭 (redis_exporter 필요)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # PostgreSQL 메트릭 (postgres_exporter 필요)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Nginx 메트릭 (nginx-prometheus-exporter 필요)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 시스템 메트릭 (node_exporter)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
    metric_relabel_configs:
      # 불필요한 메트릭 제외
      - source_labels: [__name__]
        regex: 'node_cpu_seconds_total|node_memory_.*|node_filesystem_.*|node_network_.*'
        action: keep

# 저장소 설정
storage:
  tsdb:
    retention.time: 30d
    retention.size: 10GB

# 웹 인터페이스 설정
web:
  enable-lifecycle: true
  enable-admin-api: true
  max-connections: 512