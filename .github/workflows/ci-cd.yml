name: Two Very Auto CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: two-very-auto

jobs:
  # 코드 품질 검사 및 테스트
  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r python/requirements.txt
        pip install pytest pytest-cov black flake8 mypy

    - name: Install Node Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Code Formatting Check (Python)
      run: |
        black --check python/
        black --check streaming/
        black --check cloud/
        black --check microservices/

    - name: Lint Python Code
      run: |
        flake8 python/ --max-line-length=120 --ignore=E203,W503
        flake8 streaming/ --max-line-length=120 --ignore=E203,W503
        flake8 cloud/ --max-line-length=120 --ignore=E203,W503
        flake8 microservices/ --max-line-length=120 --ignore=E203,W503

    - name: Type Check Python Code
      run: |
        mypy python/ --ignore-missing-imports
        mypy streaming/ --ignore-missing-imports

    - name: Lint Frontend Code
      working-directory: ./frontend
      run: npm run lint

    - name: Run Python Tests
      env:
        REDIS_URL: redis://localhost:6379
      run: |
        pytest python/tests/ -v --cov=python --cov-report=xml
        pytest streaming/tests/ -v --cov=streaming --cov-report=xml --cov-append
        pytest cloud/tests/ -v --cov=cloud --cov-report=xml --cov-append

    - name: Run Frontend Tests
      working-directory: ./frontend
      run: npm test

    - name: Upload Coverage Reports
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # 보안 스캔
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Python Security Scan
      uses: pypa/gh-action-pip-audit@v1.0.8
      with:
        inputs: python/requirements.txt

    - name: Run Node Security Audit
      working-directory: ./frontend
      run: npm audit --audit-level high

    - name: Run Docker Security Scan
      uses: docker/scout-action@v1
      with:
        command: cves
        image: local://two-very-auto:latest

  # Docker 이미지 빌드
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, security]
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and Push Web Image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.web
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}-web
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push AI Engine Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.ai
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}-ai
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ steps.meta.outputs.tags }}-web

  # 스테이징 배포
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    
    environment:
      name: staging
      url: https://staging.two-very-auto.com

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: Deploy to ECS Staging
      run: |
        # Update task definition with new image
        aws ecs update-service \
          --cluster two-very-auto-staging \
          --service two-very-auto-web \
          --force-new-deployment

    - name: Run Smoke Tests
      run: |
        sleep 60  # Wait for deployment
        curl -f https://staging.two-very-auto.com/api/health || exit 1

  # 프로덕션 배포
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    
    environment:
      name: production
      url: https://two-very-auto.com

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: Blue-Green Deployment
      run: |
        # Create new task definition
        NEW_TASK_DEF=$(aws ecs describe-task-definition \
          --task-definition two-very-auto-prod \
          --query 'taskDefinition' \
          --output json | \
          jq --arg IMAGE "${{ needs.build.outputs.image-tag }}-web" \
          '.containerDefinitions[0].image = $IMAGE' | \
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

        aws ecs register-task-definition \
          --cli-input-json "$NEW_TASK_DEF"

        # Update service with rolling deployment
        aws ecs update-service \
          --cluster two-very-auto-prod \
          --service two-very-auto-web \
          --task-definition two-very-auto-prod \
          --deployment-configuration maximumPercent=200,minimumHealthyPercent=100

    - name: Verify Deployment
      run: |
        # Wait for deployment to complete
        aws ecs wait services-stable \
          --cluster two-very-auto-prod \
          --services two-very-auto-web

        # Run health checks
        curl -f https://two-very-auto.com/api/health || exit 1

    - name: Notify Success
      uses: 8398a7/action-slack@v3
      if: success()
      with:
        status: success
        text: "🚀 Production deployment successful!"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 롤백 작업
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'release'
    needs: [deploy-production]
    
    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: Rollback to Previous Version
      run: |
        # Get previous task definition
        PREVIOUS_TASK_DEF=$(aws ecs describe-services \
          --cluster two-very-auto-prod \
          --services two-very-auto-web \
          --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition' \
          --output text)

        # Rollback service
        aws ecs update-service \
          --cluster two-very-auto-prod \
          --service two-very-auto-web \
          --task-definition $PREVIOUS_TASK_DEF

    - name: Notify Rollback
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: "⚠️ Production rollback completed due to deployment failure"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 성능 테스트
  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Load Test
      uses: grafana/k6-action@v0.3.1
      with:
        filename: tests/performance/load-test.js
        flags: --out json=results.json
      env:
        BASE_URL: https://staging.two-very-auto.com

    - name: Upload Performance Results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: results.json

  # 알림
  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [test, security, build]
    if: always()

    steps:
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: |
          📊 Build Status: ${{ job.status }}
          🔀 Branch: ${{ github.ref_name }}
          👤 Author: ${{ github.actor }}
          📝 Commit: ${{ github.sha }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}