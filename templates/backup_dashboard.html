<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Very Auto - 백업 시스템 대시보드</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎰</text></svg>">
</head>
<body>
    <div class="connection-status" id="connectionStatus">
        <span id="connectionText">연결 중...</span>
    </div>

    <div class="dashboard">
        <!-- 헤더 -->
        <div class="header">
            <h1>🎰 Two Very Auto</h1>
            <p>엔터프라이즈급 백업 시스템 관리 대시보드</p>
            <div id="lastUpdated" class="last-updated">마지막 업데이트: 로딩 중...</div>
        </div>

        <!-- 상태 그리드 -->
        <div class="status-grid" id="statusGrid">
            <div class="loading">📊 시스템 상태 로딩 중...</div>
        </div>

        <!-- 액션 버튼 -->
        <div class="actions">
            <button class="btn btn-primary" onclick="runManualBackup()">
                💾 수동 백업 실행
            </button>
            <button class="btn btn-success" onclick="runHealthCheck()">
                🏥 건전성 점검
            </button>
            <button class="btn btn-warning" onclick="testNotifications()">
                📢 알림 테스트
            </button>
            <button class="btn btn-primary" onclick="refreshData()">
                🔄 새로고침
            </button>
        </div>

        <!-- 백업 히스토리 섹션 -->
        <div class="logs-section">
            <h2>📈 백업 히스토리</h2>
            <div class="logs-container" id="backupHistory">
                <div class="loading">백업 히스토리 로딩 중...</div>
            </div>
        </div>

        <!-- 시스템 로그 섹션 -->
        <div class="logs-section">
            <h2>📝 시스템 로그</h2>
            <div class="logs-container" id="systemLogs">
                <div class="loading">시스템 로그 로딩 중...</div>
            </div>
        </div>
    </div>

    <!-- 모달 다이얼로그 -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">작업 진행 중</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalMessage">작업을 실행하고 있습니다...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수
        let ws = null;
        let reconnectInterval = null;
        let isConnected = false;

        // 페이지 로드 시 초기화 (강화된 초기화)
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎰 Two Very Auto 대시보드 초기화 시작...');
            
            // 네트워크 모니터링 설정
            setupNetworkMonitoring();
            
            // 순차적 초기화 (안전한 방식)
            initializeDashboard();
            
            // 30초마다 데이터 새로고침
            setInterval(() => {
                if (navigator.onLine) {
                    refreshData();
                }
            }, 30000);
        });
        
        async function initializeDashboard() {
            try {
                // WebSocket 연결 시도
                initializeWebSocket();
                
                // 데이터 로드 (병렬 처리)
                await Promise.allSettled([
                    loadSystemStatus(),
                    loadBackupHistory(), 
                    loadSystemLogs()
                ]);
                
                console.log('✅ 대시보드 초기화 완료');
                
            } catch (error) {
                console.error('대시보드 초기화 오류:', error);
                showNotification('⚠️ 초기화 주의', '일부 기능이 제한될 수 있습니다', 'warning');
            }
        }

        // WebSocket 연결 초기화 (안전한 방식)
        function initializeWebSocket() {
            try {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws`;
                
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function(event) {
                    isConnected = true;
                    updateConnectionStatus('connected', '실시간 연결됨');
                    clearInterval(reconnectInterval);
                    console.log('✅ WebSocket 연결 성공');
                    
                    // Keep-alive 신호 전송
                    const keepAliveInterval = setInterval(() => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send('ping');
                        } else {
                            clearInterval(keepAliveInterval);
                        }
                    }, 30000);
                };
                
                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        handleWebSocketMessage(data);
                    } catch (e) {
                        console.error('WebSocket 메시지 파싱 오류:', e);
                    }
                };
                
                ws.onclose = function(event) {
                    isConnected = false;
                    console.log('WebSocket 연결 종료됨:', event.code, event.reason);
                    
                    if (event.code !== 1000) { // 정상 종료가 아닌 경우
                        updateConnectionStatus('disconnected', '연결 끊어짐 - 재연결 시도 중...');
                        
                        // 재연결 시도 (지수 백오프 방식)
                        let attempts = 0;
                        reconnectInterval = setInterval(() => {
                            if (attempts < 5 && navigator.onLine) {
                                attempts++;
                                console.log(`WebSocket 재연결 시도 ${attempts}/5...`);
                                clearInterval(reconnectInterval);
                                initializeWebSocket();
                            } else if (attempts >= 5) {
                                clearInterval(reconnectInterval);
                                updateConnectionStatus('disconnected', '실시간 연결 실패 - 수동 새로고침 필요');
                            }
                        }, Math.min(5000 * Math.pow(2, attempts), 30000));
                    } else {
                        updateConnectionStatus('disconnected', '연결 종료됨');
                    }
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket 오류:', error);
                    updateConnectionStatus('disconnected', '연결 오류');
                };
                
            } catch (error) {
                console.error('WebSocket 초기화 실패:', error);
                updateConnectionStatus('disconnected', 'WebSocket을 사용할 수 없습니다');
                // WebSocket 없이도 기본 기능은 동작
            }
        }

        // WebSocket 메시지 처리
        function handleWebSocketMessage(data) {
            switch(data.type) {
                case 'backup_started':
                    showNotification('💾 백업 시작됨', `${data.config} 백업이 시작되었습니다.`, 'info');
                    break;
                    
                case 'backup_completed':
                    showNotification('✅ 백업 완료', 
                        `${data.config} 백업 완료 (${data.size_mb}MB, ${data.duration}초)`, 'success');
                    refreshData();
                    break;
                    
                case 'backup_failed':
                    showNotification('❌ 백업 실패', 
                        `${data.config} 백업 실패: ${data.error}`, 'error');
                    break;
                    
                case 'health_check_started':
                    showNotification('🏥 건전성 점검 시작', '백업 건전성 점검이 시작되었습니다.', 'info');
                    break;
                    
                case 'health_check_completed':
                    showNotification('✅ 건전성 점검 완료', 
                        `상태: ${data.status}, 테스트: ${data.test_count}개`, 'success');
                    refreshData();
                    break;
                    
                case 'restore_test_completed':
                    const testResult = data.success ? '성공' : '실패';
                    showNotification('🧪 복원 테스트 완료', 
                        `백업 ID ${data.backup_id}: ${testResult}`, 
                        data.success ? 'success' : 'warning');
                    break;
            }
        }

        // 연결 상태 업데이트
        function updateConnectionStatus(status, text) {
            const statusEl = document.getElementById('connectionStatus');
            const textEl = document.getElementById('connectionText');
            
            statusEl.className = `connection-status ${status}`;
            textEl.textContent = text;
        }

        // 시스템 상태 로드 (안전한 방식)
        async function loadSystemStatus() {
            try {
                const response = await fetch('/api/status');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                displaySystemStatus(data);
                updateLastUpdated();
                
            } catch (error) {
                console.error('시스템 상태 로드 오류:', error);
                
                // 사용자 친화적 오류 메시지
                let errorMessage = '시스템 상태를 불러올 수 없습니다';
                if (error.message.includes('Failed to fetch')) {
                    errorMessage = '서버에 연결할 수 없습니다. 서버가 실행 중인지 확인해주세요';
                } else if (error.message.includes('500')) {
                    errorMessage = '서버에서 오류가 발생했습니다. 잠시 후 다시 시도해주세요';
                }
                
                showErrorMessageWithRetry('statusGrid', errorMessage, () => loadSystemStatus());
            }
        }

        // 시스템 상태 표시
        function displaySystemStatus(data) {
            const grid = document.getElementById('statusGrid');
            
            const html = `
                <!-- 백업 상태 -->
                <div class="status-card success">
                    <div class="card-header">
                        <div class="card-title">💾 백업 상태</div>
                        <div class="status-badge badge-success">정상</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">설정된 백업</div>
                        <div class="metric-value">${Object.keys(data.backup || {}).length}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">복원 지점</div>
                        <div class="metric-value">${data.restore?.available_points || 0}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">총 크기</div>
                        <div class="metric-value">${(data.restore?.total_size_mb || 0).toFixed(1)}MB</div>
                    </div>
                </div>

                <!-- 보안 상태 -->
                <div class="status-card ${data.security?.ssl_valid ? 'success' : 'warning'}">
                    <div class="card-header">
                        <div class="card-title">🔐 보안 상태</div>
                        <div class="status-badge ${data.security?.ssl_valid ? 'badge-success' : 'badge-warning'}">
                            ${data.security?.ssl_valid ? '정상' : '주의'}
                        </div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">SSL 인증서</div>
                        <div class="metric-value">${data.security?.ssl_valid ? '유효' : '없음'}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">만료일까지</div>
                        <div class="metric-value">${data.security?.ssl_days_left || 'N/A'}일</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">암호화</div>
                        <div class="metric-value">${data.security?.encryption_enabled ? '활성화' : '비활성화'}</div>
                    </div>
                </div>

                <!-- 알림 상태 -->
                <div class="status-card success">
                    <div class="card-header">
                        <div class="card-title">📢 알림 상태</div>
                        <div class="status-badge badge-success">활성화</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">활성 채널</div>
                        <div class="metric-value">${data.notifications?.total_channels || 0}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">채널 목록</div>
                        <div class="metric-value" style="font-size: 0.9em;">
                            ${(data.notifications?.enabled_channels || []).join(', ') || '없음'}
                        </div>
                    </div>
                </div>

                <!-- 시스템 상태 -->
                <div class="status-card ${data.system?.disk?.used_percent > 85 ? 'warning' : 'success'}">
                    <div class="card-header">
                        <div class="card-title">🖥️ 시스템 상태</div>
                        <div class="status-badge ${data.system?.disk?.used_percent > 85 ? 'badge-warning' : 'badge-success'}">
                            ${data.system?.disk?.used_percent > 85 ? '주의' : '정상'}
                        </div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">디스크 사용률</div>
                        <div class="metric-value">${(data.system?.disk?.used_percent || 0).toFixed(1)}%</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">사용 가능</div>
                        <div class="metric-value">${(data.system?.disk?.free_gb || 0).toFixed(1)}GB</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${data.system?.disk?.used_percent || 0}%"></div>
                    </div>
                </div>
            `;
            
            grid.innerHTML = html;
        }

        // 백업 히스토리 로드
        async function loadBackupHistory() {
            try {
                const response = await fetch('/api/backups');
                const data = await response.json();
                
                displayBackupHistory(data.backups || []);
                
            } catch (error) {
                console.error('백업 히스토리 로드 오류:', error);
                showErrorMessage('backupHistory', '백업 히스토리를 불러올 수 없습니다.');
            }
        }

        // 백업 히스토리 표시
        function displayBackupHistory(backups) {
            const container = document.getElementById('backupHistory');
            
            if (backups.length === 0) {
                container.innerHTML = '<div class="log-entry">백업 히스토리가 없습니다.</div>';
                return;
            }
            
            const html = backups.map(backup => `
                <div class="log-entry">
                    <div class="log-message">
                        <strong>${backup.provider}</strong> - ${backup.size_mb.toFixed(1)}MB
                        <div style="font-size: 0.9em; color: #666;">
                            ${backup.type} | ${backup.age_hours.toFixed(1)}시간 전
                        </div>
                    </div>
                    <div class="log-timestamp">
                        ${new Date(backup.timestamp).toLocaleString('ko-KR')}
                    </div>
                    <button class="btn btn-primary" style="font-size: 0.8em; padding: 4px 8px;" 
                            onclick="testRestore('${backup.id}')">
                        🧪 테스트
                    </button>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }

        // 시스템 로그 로드
        async function loadSystemLogs() {
            try {
                const response = await fetch('/api/logs?limit=50');
                const data = await response.json();
                
                displaySystemLogs(data.logs || []);
                
            } catch (error) {
                console.error('시스템 로그 로드 오류:', error);
                showErrorMessage('systemLogs', '시스템 로그를 불러올 수 없습니다.');
            }
        }

        // 시스템 로그 표시
        function displaySystemLogs(logs) {
            const container = document.getElementById('systemLogs');
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="log-entry">로그가 없습니다.</div>';
                return;
            }
            
            const html = logs.map(log => {
                const levelClass = {
                    'success': 'log-success',
                    'warning': 'log-warning',
                    'error': 'log-error',
                    'info': 'log-info'
                }[log.level] || 'log-info';
                
                return `
                    <div class="log-entry ${levelClass}">
                        <div class="log-message">
                            <span class="log-type">[${log.type.toUpperCase()}]</span>
                            ${log.message}
                        </div>
                        <div class="log-timestamp">
                            ${new Date(log.timestamp).toLocaleString('ko-KR')}
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }

        // 수동 백업 실행 (강화된 오류 처리)
        async function runManualBackup() {
            showModal('💾 백업 실행 중', '수동 백업을 실행하고 있습니다...');
            
            try {
                const response = await fetch('/api/backup/run?config_name=local_backup', {
                    method: 'POST'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                closeModal();
                
                if (data.success) {
                    showNotification('✅ 백업 성공', data.message, 'success');
                    refreshData();
                } else {
                    const errorMsg = data.error || '알 수 없는 오류가 발생했습니다';
                    showNotification('❌ 백업 실패', errorMsg, 'error');
                }
                
            } catch (error) {
                closeModal();
                console.error('백업 실행 오류:', error);
                
                let errorMessage = '백업 실행 중 오류가 발생했습니다';
                if (error.message.includes('Failed to fetch')) {
                    errorMessage = '서버와 연결이 끊어졌습니다. 네트워크를 확인하고 다시 시도해주세요';
                } else if (error.message.includes('500')) {
                    errorMessage = '서버 내부 오류로 백업에 실패했습니다. 서버 상태를 확인해주세요';
                }
                
                showNotification('❌ 백업 오류', errorMessage, 'error');
            }
        }

        // 건전성 점검 실행
        async function runHealthCheck() {
            showModal('🏥 건전성 점검 중', '백업 시스템 건전성을 점검하고 있습니다...');
            
            try {
                const response = await fetch('/api/health-check', {
                    method: 'POST'
                });
                const data = await response.json();
                
                closeModal();
                
                if (data.success) {
                    showNotification('✅ 점검 완료', data.message, 'success');
                    refreshData();
                } else {
                    showNotification('❌ 점검 실패', '건전성 점검에 실패했습니다.', 'error');
                }
                
            } catch (error) {
                closeModal();
                showNotification('❌ 점검 오류', '건전성 점검 중 오류가 발생했습니다.', 'error');
                console.error('건전성 점검 오류:', error);
            }
        }

        // 알림 테스트
        async function testNotifications() {
            showModal('📢 알림 테스트 중', '테스트 알림을 전송하고 있습니다...');
            
            try {
                const response = await fetch('/api/notifications/test', {
                    method: 'POST'
                });
                const data = await response.json();
                
                closeModal();
                
                if (data.success) {
                    showNotification('✅ 알림 테스트 완료', data.message, 'success');
                } else {
                    showNotification('❌ 알림 테스트 실패', '알림 전송에 실패했습니다.', 'error');
                }
                
            } catch (error) {
                closeModal();
                showNotification('❌ 알림 오류', '알림 테스트 중 오류가 발생했습니다.', 'error');
                console.error('알림 테스트 오류:', error);
            }
        }

        // 복원 테스트
        async function testRestore(backupId) {
            showModal('🧪 복원 테스트 중', `백업 ${backupId}를 테스트하고 있습니다...`);
            
            try {
                const response = await fetch(`/api/backup/test-restore?backup_id=${backupId}`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                closeModal();
                
                if (data.success) {
                    showNotification('✅ 복원 테스트 성공', '백업이 정상적으로 복원되었습니다.', 'success');
                } else {
                    showNotification('❌ 복원 테스트 실패', '백업 복원에 실패했습니다.', 'error');
                }
                
            } catch (error) {
                closeModal();
                showNotification('❌ 테스트 오류', '복원 테스트 중 오류가 발생했습니다.', 'error');
                console.error('복원 테스트 오류:', error);
            }
        }

        // 데이터 새로고침
        async function refreshData() {
            await Promise.all([
                loadSystemStatus(),
                loadBackupHistory(),
                loadSystemLogs()
            ]);
        }

        // 마지막 업데이트 시간 표시
        function updateLastUpdated() {
            const now = new Date();
            const formatted = now.toLocaleString('ko-KR');
            document.getElementById('lastUpdated').textContent = `마지막 업데이트: ${formatted}`;
        }

        // 모달 표시
        function showModal(title, message) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        // 모달 닫기
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // 알림 표시 (브라우저 알림 또는 토스트)
        function showNotification(title, message, type) {
            // 브라우저 알림 사용 (권한이 있는 경우)
            if (Notification.permission === 'granted') {
                new Notification(title, {
                    body: message,
                    icon: '/static/favicon.ico'
                });
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        new Notification(title, {
                            body: message,
                            icon: '/static/favicon.ico'
                        });
                    }
                });
            }
            
            // 콘솔에도 로그 출력
            console.log(`[${type.toUpperCase()}] ${title}: ${message}`);
        }

        // 오류 메시지 표시 (재시도 버튼 포함)
        function showErrorMessage(containerId, message) {
            document.getElementById(containerId).innerHTML = 
                `<div class="log-entry log-error">${message}</div>`;
        }
        
        function showErrorMessageWithRetry(containerId, message, retryFunction) {
            const container = document.getElementById(containerId);
            container.innerHTML = `
                <div class="error-panel">
                    <div class="error-icon">⚠️</div>
                    <div class="error-content">
                        <h3>연결 오류</h3>
                        <p>${message}</p>
                        <div class="error-actions">
                            <button class="btn btn-primary" onclick="${retryFunction.name}()">🔄 재시도</button>
                            <button class="btn btn-warning" onclick="location.reload()">🌐 페이지 새로고침</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 네트워크 상태 모니터링
        function setupNetworkMonitoring() {
            window.addEventListener('online', function() {
                showNotification('🌐 연결 복구', '네트워크 연결이 복구되었습니다', 'success');
                refreshData();
            });
            
            window.addEventListener('offline', function() {
                showNotification('📵 연결 끊어짐', '네트워크 연결이 끊어졌습니다', 'warning');
            });
        }

        // 키보드 단축키
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key) {
                    case 'r':
                        e.preventDefault();
                        refreshData();
                        break;
                    case 'b':
                        e.preventDefault();
                        runManualBackup();
                        break;
                    case 'h':
                        e.preventDefault();
                        runHealthCheck();
                        break;
                }
            }
        });

        // 모달 클릭 이벤트 (오버레이 클릭 시 닫기)
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>

    <style>

            align-items: center;
            z-index: 1000;
        }

        .modal-content {

            color: white;

            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {

        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .modal-close:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .modal-body {
            padding: 30px;
            text-align: center;
        }

        .last-updated {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 10px;
        }

        .log-success { border-left: 3px solid var(--success-color); }
        .log-warning { border-left: 3px solid var(--warning-color); }
        .log-error { border-left: 3px solid var(--danger-color); }
        .log-info { border-left: 3px solid var(--secondary-color); }

        .log-type {
            font-weight: bold;
            margin-right: 8px;
            font-size: 0.9em;
        }

        .status-card .btn {
            font-size: 0.8em;
            padding: 4px 8px;
            margin-left: 10px;
        }
        
        /* 오류 패널 스타일 */
        .error-panel {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);

        }
        
        .error-icon {

        .error-actions .btn {
            font-size: 0.9em;

        }
    </style>
</body>
